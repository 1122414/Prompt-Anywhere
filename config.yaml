# Prompt Anywhere 配置文件
# 注意：环境变量优先级高于此配置文件

app:
  hotkey: "ctrl+alt+p"
  always_on_top: true
  start_minimized: false

storage:
  data_dir: "./data"
  export_dir: "./exports"

ui:
  window_x: 100
  window_y: 100
  window_width: 900
  window_height: 600
  default_mode: "edit"

model:
  provider: ""
  name: ""
  api_key: ""
  base_url: ""
  temperature: 0.7
