[supervisord]
nodaemon=true

[program:xvfb]
command=Xvfb :99 -screen 0 1024x768x24
autorestart=true

[program:fluxbox]
command=fluxbox
autorestart=true

[program:x11vnc]
command=x11vnc -display :99 -forever -nopw -listen 0.0.0.0 -rfbport 5900
autorestart=true

[program:websockify]
command=websockify --web /usr/share/novnc 6080 localhost:5900
autorestart=true

[program:prompt-anywhere]
command=python -m app.main
directory=/app
autorestart=true
